name: CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [labeled]

permissions:
  contents: read

env:
  TWENTY_DEPLOY_URL: https://admin.jumbohomes.in

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'deploy')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure Twenty remote
        run: |
          mkdir -p ~/.twenty
          echo '{
            "version": 1,
            "remotes": {
              "production": {
                "apiUrl": "${{ env.TWENTY_DEPLOY_URL }}",
                "apiKey": "${{ secrets.TWENTY_DEPLOY_API_KEY }}"
              }
            },
            "defaultRemote": "production"
          }' > ~/.twenty/config.json

      - name: Deploy to production
        run: yarn twenty dev --once --remote production
